<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Glacial Indifference";
        src: url("fonts/GlacialIndifference-Regular.woff2") format("woff2");
        font-weight: 400;
      }
      @font-face {
        font-family: "Glacial Indifference";
        src: url("fonts/GlacialIndifference-Bold.woff2") format("woff2");
        font-weight: 700;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f6eee5;
        font-family: "Glacial Indifference", sans-serif;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* later scenes stack above earlier ones during crossfades */
      #s1 { z-index: 1; }
      #s2 { z-index: 2; }
      #s3 { z-index: 3; }
      #s4 { z-index: 4; }
      #s5 { z-index: 5; }

      /* Scene 1: wordmark reveal on blush peach */
      #s1 {
        background: #f0cdb3;
      }
      .s1-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 60px;
        gap: 48px;
      }
      .wordmark {
        display: flex;
        color: #fffbf8;
        font-size: 150px;
        font-weight: 400;
      }
      .wordmark span {
        display: inline-block;
        margin-right: 0.26em;
      }
      .wordmark span:last-child {
        margin-right: 0;
      }
      .underline {
        width: 220px;
        height: 7px;
        background: #fffbf8;
        transform-origin: center;
      }

      /* Scenes 2-4: full-bleed image + tagline */
      .photo-wrap {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .photo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .scene-copy {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 90px 200px 90px;
        gap: 10px;
        text-align: center;
      }
      .tagline-line {
        color: #fffbf8;
        font-size: 84px;
        line-height: 1.35;
        letter-spacing: 0.04em;
        text-shadow: 0 4px 26px rgba(45, 24, 20, 0.55);
      }
      .mini-mark {
        margin-top: 54px;
        color: #fffbf8;
        font-size: 38px;
        letter-spacing: 0.32em;
        text-indent: 0.32em; /* balances the tracking so it centers true */
        text-shadow: 0 3px 18px rgba(45, 24, 20, 0.55);
      }

      /* Scene 5: end card on cream */
      #s5 {
        background: #f6eee5;
      }
      .s5-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 60px;
        gap: 44px;
        text-align: center;
      }
      .s5-wordmark {
        color: #833827;
        font-size: 108px;
        letter-spacing: 0.28em;
        text-indent: 0.28em;
      }
      .s5-underline {
        width: 170px;
        height: 6px;
        background: #833827;
        transform-origin: center;
      }
      .s5-launch {
        color: #4a433c;
        font-size: 52px;
        letter-spacing: 0.12em;
        text-indent: 0.12em;
      }
      .s5-handle {
        color: #c6926e;
        font-size: 40px;
        letter-spacing: 0.08em;
        text-indent: 0.08em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="13"
      data-width="1080"
      data-height="1920"
    >
      <!-- Scene 1: brand reveal -->
      <div id="s1" class="clip scene" data-start="0" data-duration="3.4" data-track-index="1">
        <div class="s1-content">
          <div class="wordmark" aria-label="SPORTIF">
            <span class="wm-letter">S</span><span class="wm-letter">P</span><span class="wm-letter">O</span><span class="wm-letter">R</span><span class="wm-letter">T</span><span class="wm-letter">I</span><span class="wm-letter">F</span>
          </div>
          <div class="underline" id="s1-underline"></div>
        </div>
      </div>

      <!-- Scene 2: everyday training, elevated -->
      <div id="s2" class="clip scene" data-start="3" data-duration="3" data-track-index="2">
        <div class="photo-wrap"><img id="s2-img" src="images/bg-action-training-low.png" alt="" data-layout-allow-overflow /></div>
        <div class="scene-copy">
          <div class="tagline-line" id="s2-l1">Everyday training,</div>
          <div class="tagline-line" id="s2-l2">elevated.</div>
          <div class="mini-mark" id="s2-mark">SPORTIF</div>
        </div>
      </div>

      <!-- Scene 3: too fashionable not to WEAR -->
      <div id="s3" class="clip scene" data-start="5.6" data-duration="3" data-track-index="1">
        <div class="photo-wrap"><img id="s3-img" src="images/bg-action-fashion-low.png" alt="" data-layout-allow-overflow /></div>
        <div class="scene-copy">
          <div class="tagline-line" id="s3-l1">Too fashionable</div>
          <div class="tagline-line" id="s3-l2">not to WEAR!</div>
          <div class="mini-mark" id="s3-mark">SPORTIF</div>
        </div>
      </div>

      <!-- Scene 4: for your morning ritual -->
      <div id="s4" class="clip scene" data-start="8.2" data-duration="3" data-track-index="2">
        <div class="photo-wrap"><img id="s4-img" src="images/bg-action-ritual-low.png" alt="" data-layout-allow-overflow /></div>
        <div class="scene-copy">
          <div class="tagline-line" id="s4-l1">For your</div>
          <div class="tagline-line" id="s4-l2">morning ritual.</div>
          <div class="mini-mark" id="s4-mark">SPORTIF</div>
        </div>
      </div>

      <!-- Scene 5: end card -->
      <div id="s5" class="clip scene" data-start="10.8" data-duration="2.2" data-track-index="1">
        <div class="s5-content">
          <div class="s5-wordmark" id="s5-wordmark">SPORTIF</div>
          <div class="s5-underline" id="s5-underline"></div>
          <div class="s5-launch" id="s5-launch">Launching September 2026</div>
          <div class="s5-handle" id="s5-handle">@sportifcollection</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* Scene 1: letters rise in one by one, underline draws */
      tl.from(".wm-letter", {
        y: 90,
        opacity: 0,
        duration: 0.7,
        ease: "power3.out",
        stagger: 0.12,
      }, 0.2);
      tl.from("#s1-underline", {
        scaleX: 0,
        opacity: 0,
        duration: 0.6,
        ease: "power2.inOut",
      }, 1.3);

      /* crossfade into scene 2, gentle Ken Burns zoom-out */
      tl.from("#s2", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 3.0);
      tl.from("#s2-img", { scale: 1.08, duration: 3.0, ease: "none" }, 3.0);
      tl.from("#s2-l1", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 3.4);
      tl.from("#s2-l2", { y: 45, opacity: 0, duration: 0.55, ease: "power2.out" }, 3.6);
      tl.from("#s2-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 3.9);

      /* crossfade into scene 3, slow lateral drift */
      tl.from("#s3", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 5.6);
      tl.fromTo("#s3-img", { x: -30, scale: 1.06 }, { x: 30, scale: 1.06, duration: 3.0, ease: "none" }, 5.6);
      tl.from("#s3-l1", { y: 60, opacity: 0, duration: 0.6, ease: "expo.out" }, 6.0);
      tl.from("#s3-l2", { y: 45, opacity: 0, duration: 0.55, ease: "power2.out" }, 6.2);
      tl.from("#s3-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 6.5);

      /* crossfade into scene 4, gentle zoom-in */
      tl.from("#s4", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 8.2);
      tl.fromTo("#s4-img", { scale: 1.0 }, { scale: 1.07, duration: 3.0, ease: "none" }, 8.2);
      tl.from("#s4-l1", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 8.6);
      tl.from("#s4-l2", { y: 45, opacity: 0, duration: 0.55, ease: "power2.out" }, 8.8);
      tl.from("#s4-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 9.1);

      /* crossfade into scene 5 (end card) */
      tl.from("#s5", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 10.8);
      tl.from("#s5-wordmark", { y: 50, opacity: 0, duration: 0.6, ease: "power3.out" }, 11.1);
      tl.from("#s5-underline", { scaleX: 0, duration: 0.5, ease: "power2.inOut" }, 11.4);
      tl.from("#s5-launch", { y: 30, opacity: 0, duration: 0.55, ease: "power2.out" }, 11.6);
      tl.from("#s5-handle", { opacity: 0, duration: 0.5, ease: "sine.out" }, 11.9);

      /* final scene only: allowed fade out */
      tl.to("#s5 .s5-content", { opacity: 0, duration: 0.45, ease: "power1.in" }, 12.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>

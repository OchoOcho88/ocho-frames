<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Glacial Indifference";
        src: url("fonts/GlacialIndifference-Regular.woff2") format("woff2");
        font-weight: 400;
      }
      @font-face {
        font-family: "Glacial Indifference";
        src: url("fonts/GlacialIndifference-Bold.woff2") format("woff2");
        font-weight: 700;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #F0CDB3;
        font-family: "Glacial Indifference", sans-serif;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #F0CDB3; /* every scene sits on the blush-peach ground */
      }
      /* later scenes stack above earlier ones during crossfades */
      #s1 { z-index: 1; }
      #s2 { z-index: 2; }
      #s3 { z-index: 3; }
      #s4 { z-index: 4; }
      #s5 { z-index: 5; }
      /* scenes 2-5 start hidden and fade in on their cue (explicit, lint-clean) */
      #s2, #s3, #s4, #s5 { opacity: 0; }

      /* Scene 1: wordmark reveal on blush peach */
      .s1-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 60px;
        gap: 48px;
      }
      .wordmark {
        display: flex;
        color: #fffbf8;
        font-size: 150px;
        font-weight: 400;
      }
      .wordmark span {
        display: inline-block;
        margin-right: 0.26em;
      }
      .wordmark span:last-child {
        margin-right: 0;
      }
      .underline {
        width: 220px;
        height: 7px;
        background: #fffbf8;
        transform-origin: center;
      }

      /* Scenes 2-4: full 4:5 photo presented as a framed card on peach */
      .card-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 90px 90px 120px 90px;
        gap: 66px;
      }
      .card {
        position: relative;
        width: 900px;
        height: 1125px; /* 4:5, preserves the whole shot */
        overflow: hidden;
        border-radius: 10px;
        background: #F0CDB3;
        box-shadow: 0 26px 60px rgba(74, 42, 26, 0.28);
      }
      /* Over-cover so the gentle zoom never exposes a bare edge inside the card */
      .card img {
        position: absolute;
        top: -3%;
        left: -3%;
        width: 106%;
        height: 106%;
        object-fit: cover;
      }
      .caption {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }
      .tagline-line {
        color: #4A433C;
        font-size: 76px;
        line-height: 1.28;
        letter-spacing: 0.02em;
      }
      .tagline-line.accent {
        color: #833827;
      }
      .mini-mark {
        margin-top: 30px;
        color: #833827;
        font-size: 34px;
        letter-spacing: 0.34em;
        text-indent: 0.34em; /* balances the tracking so it centers true */
      }

      /* Scene 5: end card on blush peach (matches scene 1 identity) */
      .s5-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 60px;
        gap: 44px;
        text-align: center;
      }
      .s5-wordmark {
        color: #FFFBF8;
        font-size: 108px;
        letter-spacing: 0.28em;
        text-indent: 0.28em;
      }
      .s5-underline {
        width: 170px;
        height: 6px;
        background: #FFFBF8;
        transform-origin: center;
      }
      .s5-soon {
        color: #4A433C;
        font-size: 52px;
        letter-spacing: 0.12em;
        text-indent: 0.12em;
      }
      .s5-handle {
        color: #833827;
        font-size: 40px;
        letter-spacing: 0.08em;
        text-indent: 0.08em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
    >
      <!-- Scene 1: brand reveal -->
      <div id="s1" class="clip scene" data-start="0" data-duration="3.4" data-track-index="1">
        <div class="s1-content">
          <div class="wordmark" aria-label="SPORTIF">
            <span class="wm-letter">S</span><span class="wm-letter">P</span><span class="wm-letter">O</span><span class="wm-letter">R</span><span class="wm-letter">T</span><span class="wm-letter">I</span><span class="wm-letter">F</span>
          </div>
          <div class="underline" id="s1-underline"></div>
        </div>
      </div>

      <!-- Scene 2: everyday training, elevated -->
      <div id="s2" class="clip scene" data-start="3" data-duration="3" data-track-index="2">
        <div class="card-content">
          <div class="card"><img id="s2-img" src="images/scene1-training.png" alt="" data-layout-allow-overflow /></div>
          <div class="caption">
            <div class="tagline-line" id="s2-l1">Everyday training,</div>
            <div class="tagline-line" id="s2-l2">elevated.</div>
            <div class="mini-mark" id="s2-mark">SPORTIF</div>
          </div>
        </div>
      </div>

      <!-- Scene 3: too fashionable not to WEAR -->
      <div id="s3" class="clip scene" data-start="5.6" data-duration="3" data-track-index="1">
        <div class="card-content">
          <div class="card"><img id="s3-img" src="images/scene2-fashion.png" alt="" data-layout-allow-overflow /></div>
          <div class="caption">
            <div class="tagline-line" id="s3-l1">Too fashionable</div>
            <div class="tagline-line accent" id="s3-l2">not to WEAR!</div>
            <div class="mini-mark" id="s3-mark">SPORTIF</div>
          </div>
        </div>
      </div>

      <!-- Scene 4: for your morning ritual -->
      <div id="s4" class="clip scene" data-start="8.2" data-duration="3" data-track-index="2">
        <div class="card-content">
          <div class="card"><img id="s4-img" src="images/scene3-ritual.png" alt="" data-layout-allow-overflow /></div>
          <div class="caption">
            <div class="tagline-line" id="s4-l1">For your</div>
            <div class="tagline-line" id="s4-l2">morning ritual.</div>
            <div class="mini-mark" id="s4-mark">SPORTIF</div>
          </div>
        </div>
      </div>

      <!-- Scene 5: end card (no launch date, brand-awareness only) -->
      <div id="s5" class="clip scene" data-start="10.8" data-duration="4.2" data-track-index="1">
        <div class="s5-content">
          <div class="s5-wordmark" id="s5-wordmark">SPORTIF</div>
          <div class="s5-underline" id="s5-underline"></div>
          <div class="s5-soon" id="s5-soon">Coming soon</div>
          <div class="s5-handle" id="s5-handle">@sportifcollection</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* Scene 1: letters rise in one by one, underline draws */
      tl.from(".wm-letter", {
        y: 90,
        opacity: 0,
        duration: 0.7,
        ease: "power3.out",
        stagger: 0.12,
      }, 0.2);
      tl.from("#s1-underline", {
        scaleX: 0,
        opacity: 0,
        duration: 0.6,
        ease: "power2.inOut",
      }, 1.3);

      /* crossfade into scene 2, card rises + gentle zoom-out inside the frame */
      tl.to("#s2", { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 3.0);
      tl.from("#s2 .card", { y: 40, scale: 0.985, duration: 0.7, ease: "power3.out" }, 3.1);
      tl.from("#s2-img", { scale: 1.08, duration: 3.0, ease: "none" }, 3.0);
      tl.from("#s2-l1", { y: 44, opacity: 0, duration: 0.6, ease: "power3.out" }, 3.5);
      tl.from("#s2-l2", { y: 34, opacity: 0, duration: 0.55, ease: "power2.out" }, 3.7);
      tl.from("#s2-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 4.0);

      /* crossfade into scene 3, slow lateral drift inside the frame */
      tl.to("#s3", { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 5.6);
      tl.from("#s3 .card", { y: 40, scale: 0.985, duration: 0.7, ease: "power3.out" }, 5.7);
      tl.fromTo("#s3-img", { x: -24, scale: 1.06 }, { x: 24, scale: 1.06, duration: 3.0, ease: "none" }, 5.6);
      tl.from("#s3-l1", { y: 44, opacity: 0, duration: 0.6, ease: "expo.out" }, 6.1);
      tl.from("#s3-l2", { y: 34, opacity: 0, duration: 0.55, ease: "power2.out" }, 6.3);
      tl.from("#s3-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 6.6);

      /* crossfade into scene 4, gentle zoom-in inside the frame */
      tl.to("#s4", { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 8.2);
      tl.from("#s4 .card", { y: 40, scale: 0.985, duration: 0.7, ease: "power3.out" }, 8.3);
      tl.fromTo("#s4-img", { scale: 1.0 }, { scale: 1.07, duration: 3.0, ease: "none" }, 8.2);
      tl.from("#s4-l1", { y: 44, opacity: 0, duration: 0.6, ease: "power3.out" }, 8.7);
      tl.from("#s4-l2", { y: 34, opacity: 0, duration: 0.55, ease: "power2.out" }, 8.9);
      tl.from("#s4-mark", { opacity: 0, duration: 0.6, ease: "sine.out" }, 9.2);

      /* crossfade into scene 5 (end card), assemble, hold, gentle fade */
      tl.to("#s5", { opacity: 1, duration: 0.35, ease: "power1.inOut" }, 10.8);
      tl.from("#s5-wordmark", { y: 46, opacity: 0, duration: 0.5, ease: "power3.out" }, 10.85);
      tl.from("#s5-underline", { scaleX: 0, duration: 0.4, ease: "power2.inOut" }, 11.05);
      tl.from("#s5-soon", { y: 28, opacity: 0, duration: 0.42, ease: "power2.out" }, 11.15);
      tl.from("#s5-handle", { opacity: 0, duration: 0.4, ease: "sine.out" }, 11.25);

      /* the fully assembled card holds readable for ~3s, then fades at the end */
      tl.to("#s5 .s5-content", { opacity: 0, duration: 0.2, ease: "power1.in" }, 14.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>

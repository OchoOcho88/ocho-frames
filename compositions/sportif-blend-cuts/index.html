<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face { font-family: "Glacial Indifference"; src: url("fonts/GlacialIndifference-Regular.woff2") format("woff2"); font-weight: 400; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #EEC7AF; font-family: "Glacial Indifference", sans-serif; }
      #stage { position: absolute; inset: 0; overflow: hidden; background: #EEC7AF; }
      .cut { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transform-origin: center; will-change: transform, opacity; }
      .cover { object-fit: cover; object-position: center; }
      .prod { object-fit: contain; }
      .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #EEC7AF; z-index: 50; }
      #endcard { opacity: 0; }
      .wm { color: #FFFBF8; font-size: 132px; letter-spacing: 0.26em; text-indent: 0.26em; }
      .rule { width: 200px; height: 7px; background: #FFFBF8; margin-top: 34px; transform-origin: center; }
      .soon { margin-top: 40px; color: #4A433C; font-size: 50px; letter-spacing: 0.12em; text-indent: 0.12em; }
      .handle { margin-top: 20px; color: #833827; font-size: 38px; letter-spacing: 0.08em; text-indent: 0.08em; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="14.00" data-width="1080" data-height="1920">
      <div id="stage" class="clip" data-start="0" data-duration="14.00" data-track-index="1">
        <img id="life0" class="cut cover" src="images/life0.png" alt="" data-layout-allow-overflow />
        <img id="life1" class="cut cover" src="images/life1.png" alt="" data-layout-allow-overflow />
        <img id="life2" class="cut cover" src="images/life2.png" alt="" data-layout-allow-overflow />
        <img id="life3" class="cut cover" src="images/life3.png" alt="" data-layout-allow-overflow />
        <img id="life4" class="cut cover" src="images/life4.png" alt="" data-layout-allow-overflow />
        <img id="life5" class="cut cover" src="images/life5.png" alt="" data-layout-allow-overflow />
        <img id="life6" class="cut cover" src="images/life6.png" alt="" data-layout-allow-overflow />
        <img id="life7" class="cut cover" src="images/life7.png" alt="" data-layout-allow-overflow />
        <img id="prodL" class="cut prod" src="images/prodL.png" alt="" data-layout-allow-overflow />
        <img id="prodM" class="cut prod" src="images/prodM.png" alt="" data-layout-allow-overflow />
        <img id="prodH" class="cut prod" src="images/prodH.png" alt="" data-layout-allow-overflow />
        <img id="prodF" class="cut prod" src="images/prodF.png" alt="" data-layout-allow-overflow />
      </div>
      <div id="intro" class="overlay clip" data-start="0" data-duration="1.00" data-track-index="2">
        <div class="wm">SPORTIF</div><div class="rule"></div>
      </div>
      <div id="endcard" class="overlay clip" data-start="11.00" data-duration="3.00" data-track-index="3">
        <div class="wm">SPORTIF</div><div class="rule" id="ec-rule"></div>
        <div class="soon">Coming soon</div><div class="handle">@sportifcollection</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#intro .wm", { opacity: 0, y: 30, duration: 0.4, ease: "power3.out" }, 0.05);
      tl.from("#intro .rule", { scaleX: 0, duration: 0.35, ease: "power2.inOut" }, 0.25);
      tl.to("#intro", { opacity: 0, duration: 0.18, ease: "power1.in" }, 0.820);
      tl.set("#life0", { opacity: 1 }, 1.000);
      tl.fromTo("#life0", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 1.000);
      tl.set("#life0", { opacity: 0 }, 1.500);
      tl.set("#prodL", { opacity: 1 }, 1.500);
      tl.fromTo("#prodL", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 1.500);
      tl.set("#prodL", { opacity: 0 }, 2.000);
      tl.set("#life1", { opacity: 1 }, 2.000);
      tl.fromTo("#life1", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 2.000);
      tl.set("#life1", { opacity: 0 }, 2.500);
      tl.set("#prodM", { opacity: 1 }, 2.500);
      tl.fromTo("#prodM", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 2.500);
      tl.set("#prodM", { opacity: 0 }, 3.000);
      tl.set("#life2", { opacity: 1 }, 3.000);
      tl.fromTo("#life2", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 3.000);
      tl.set("#life2", { opacity: 0 }, 3.500);
      tl.set("#prodH", { opacity: 1 }, 3.500);
      tl.fromTo("#prodH", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 3.500);
      tl.set("#prodH", { opacity: 0 }, 4.000);
      tl.set("#life3", { opacity: 1 }, 4.000);
      tl.fromTo("#life3", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 4.000);
      tl.set("#life3", { opacity: 0 }, 4.500);
      tl.set("#prodF", { opacity: 1 }, 4.500);
      tl.fromTo("#prodF", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 4.500);
      tl.set("#prodF", { opacity: 0 }, 5.000);
      tl.set("#life4", { opacity: 1 }, 5.000);
      tl.fromTo("#life4", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 5.000);
      tl.set("#life4", { opacity: 0 }, 5.500);
      tl.set("#prodL", { opacity: 1 }, 5.500);
      tl.fromTo("#prodL", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 5.500);
      tl.set("#prodL", { opacity: 0 }, 6.000);
      tl.set("#life5", { opacity: 1 }, 6.000);
      tl.fromTo("#life5", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 6.000);
      tl.set("#life5", { opacity: 0 }, 6.500);
      tl.set("#prodM", { opacity: 1 }, 6.500);
      tl.fromTo("#prodM", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 6.500);
      tl.set("#prodM", { opacity: 0 }, 7.000);
      tl.set("#life6", { opacity: 1 }, 7.000);
      tl.fromTo("#life6", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 7.000);
      tl.set("#life6", { opacity: 0 }, 7.500);
      tl.set("#prodH", { opacity: 1 }, 7.500);
      tl.fromTo("#prodH", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 7.500);
      tl.set("#prodH", { opacity: 0 }, 8.000);
      tl.set("#life7", { opacity: 1 }, 8.000);
      tl.fromTo("#life7", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 8.000);
      tl.set("#life7", { opacity: 0 }, 8.500);
      tl.set("#prodF", { opacity: 1 }, 8.500);
      tl.fromTo("#prodF", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 8.500);
      tl.set("#prodF", { opacity: 0 }, 9.000);
      tl.set("#life0", { opacity: 1 }, 9.000);
      tl.fromTo("#life0", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 9.000);
      tl.set("#life0", { opacity: 0 }, 9.250);
      tl.set("#life1", { opacity: 1 }, 9.250);
      tl.fromTo("#life1", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 9.250);
      tl.set("#life1", { opacity: 0 }, 9.500);
      tl.set("#prodM", { opacity: 1 }, 9.500);
      tl.fromTo("#prodM", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 9.500);
      tl.set("#prodM", { opacity: 0 }, 9.750);
      tl.set("#life4", { opacity: 1 }, 9.750);
      tl.fromTo("#life4", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 9.750);
      tl.set("#life4", { opacity: 0 }, 10.000);
      tl.set("#life2", { opacity: 1 }, 10.000);
      tl.fromTo("#life2", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 10.000);
      tl.set("#life2", { opacity: 0 }, 10.250);
      tl.set("#prodH", { opacity: 1 }, 10.250);
      tl.fromTo("#prodH", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 10.250);
      tl.set("#prodH", { opacity: 0 }, 10.500);
      tl.set("#life5", { opacity: 1 }, 10.500);
      tl.fromTo("#life5", { scale: 1.06 }, { scale: 1.0, duration: 0.225, ease: "power2.out" }, 10.500);
      tl.set("#life5", { opacity: 0 }, 10.750);
      tl.set("#prodF", { opacity: 1 }, 10.750);
      tl.fromTo("#prodF", { scale: 1.06 }, { scale: 1.0, duration: 0.450, ease: "power2.out" }, 10.750);
      tl.set("#prodF", { opacity: 0 }, 11.000);
      tl.to("#endcard", { opacity: 1, duration: 0.2, ease: "power1.out" }, 11.000);
      tl.from("#endcard .wm", { opacity: 0, y: 34, duration: 0.45, ease: "power3.out" }, 11.050);
      tl.from("#ec-rule", { scaleX: 0, duration: 0.35, ease: "power2.inOut" }, 11.200);
      tl.from("#endcard .soon", { opacity: 0, y: 22, duration: 0.4, ease: "power2.out" }, 11.300);
      tl.from("#endcard .handle", { opacity: 0, duration: 0.35, ease: "sine.out" }, 11.420);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>

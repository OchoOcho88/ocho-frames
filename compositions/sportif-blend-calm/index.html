<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face { font-family: "Glacial Indifference"; src: url("fonts/GlacialIndifference-Regular.woff2") format("woff2"); font-weight: 400; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #EEC7AF; font-family: "Glacial Indifference", sans-serif; }
      .scene { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; background: #EEC7AF;
               display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 60px; padding: 90px; }
      #s1 { z-index: 1; } #s2 { z-index: 2; } #s3 { z-index: 3; } #s4 { z-index: 4; } #s5 { z-index: 5; } #s6 { z-index: 6; }
      #s2, #s3, #s4, #s5, #s6 { opacity: 0; }

      .card { position: relative; overflow: hidden; border-radius: 10px; background: #EEC7AF; box-shadow: 0 24px 56px rgba(74,42,26,0.26); }
      .card.p45 { width: 880px; height: 1100px; }          /* 4:5 photo/product card */
      .card.land { width: 980px; height: 654px; }           /* landscape flatlay card */
      .card img { position: absolute; top: -3%; left: -3%; width: 106%; height: 106%; object-fit: cover; }
      .card.land img { top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

      .cap-line { color: #4A433C; font-size: 72px; line-height: 1.25; letter-spacing: 0.01em; }
      .cap-line.accent { color: #833827; }

      .wm { color: #FFFBF8; font-size: 132px; letter-spacing: 0.26em; text-indent: 0.26em; }
      .rule { width: 200px; height: 7px; background: #FFFBF8; margin-top: 34px; transform-origin: center; }
      .soon { margin-top: 40px; color: #4A433C; font-size: 50px; letter-spacing: 0.12em; text-indent: 0.12em; }
      .handle { margin-top: 20px; color: #833827; font-size: 38px; letter-spacing: 0.08em; text-indent: 0.08em; }
      #s1, #s6 { gap: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15.4" data-width="1080" data-height="1920">
      <div id="s1" class="scene clip" data-start="0" data-duration="2.6" data-track-index="1">
        <div class="wm">SPORTIF</div><div class="rule" id="s1-rule"></div>
      </div>

      <div id="s2" class="scene clip" data-start="2.2" data-duration="3.0" data-track-index="2">
        <div class="card p45"><img id="s2-img" src="images/beach.png" alt="" data-layout-allow-overflow /></div>
        <div class="cap-line">For your morning ritual.</div>
      </div>

      <div id="s3" class="scene clip" data-start="4.9" data-duration="3.0" data-track-index="1">
        <div class="card land"><img id="s3-img" src="images/flatlay.png" alt="" data-layout-allow-overflow /></div>
        <div class="cap-line">Three strengths.</div>
      </div>

      <div id="s4" class="scene clip" data-start="7.6" data-duration="3.0" data-track-index="2">
        <div class="card p45"><img id="s4-img" src="images/studio.png" alt="" data-layout-allow-overflow /></div>
        <div class="cap-line">Everyday training, elevated.</div>
      </div>

      <div id="s5" class="scene clip" data-start="10.3" data-duration="3.0" data-track-index="1">
        <div class="card p45"><img id="s5-img" src="images/band.png" alt="" data-layout-allow-overflow /></div>
        <div class="cap-line accent">Find your resistance.</div>
      </div>

      <div id="s6" class="scene clip" data-start="13.0" data-duration="2.4" data-track-index="2">
        <div class="wm">SPORTIF</div><div class="rule" id="s6-rule"></div>
        <div class="soon">Coming soon</div><div class="handle">@sportifcollection</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#s1 .wm", { opacity: 0, y: 30, duration: 0.5, ease: "power3.out" }, 0.1);
      tl.from("#s1-rule", { scaleX: 0, duration: 0.4, ease: "power2.inOut" }, 0.4);

      function scene(id, at, img) {
        tl.to("#" + id, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, at);
        tl.from("#" + id + " .card", { opacity: 0, scale: 0.97, y: 30, duration: 0.7, ease: "power3.out" }, at + 0.1);
        tl.from("#" + img, { scale: 1.08, duration: 3.0, ease: "none" }, at);
        tl.from("#" + id + " .cap-line", { opacity: 0, y: 26, duration: 0.55, ease: "power2.out" }, at + 0.5);
      }
      scene("s2", 2.2, "s2-img");
      scene("s3", 4.9, "s3-img");
      scene("s4", 7.6, "s4-img");
      scene("s5", 10.3, "s5-img");

      tl.to("#s6", { opacity: 1, duration: 0.35, ease: "power1.inOut" }, 13.0);
      tl.from("#s6 .wm", { opacity: 0, y: 34, duration: 0.5, ease: "power3.out" }, 13.1);
      tl.from("#s6-rule", { scaleX: 0, duration: 0.4, ease: "power2.inOut" }, 13.3);
      tl.from("#s6 .soon", { opacity: 0, y: 22, duration: 0.42, ease: "power2.out" }, 13.4);
      tl.from("#s6 .handle", { opacity: 0, duration: 0.4, ease: "sine.out" }, 13.55);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
